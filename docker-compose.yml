services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  selenium-hub:
    image: selenium/hub:4.42.0
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4444/wd/hub/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  chrome:
    image: selenium/node-chrome:4.42.0
    shm_size: "2gb"
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443

  tests:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      selenium-hub:
        condition: service_healthy
      chrome:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_NAME: testdb
      DB_USER: testuser
      DB_PASS: testpass
      DB_PORT: 5432
      API_BASE_URL: https://jsonplaceholder.typicode.com
      SELENIUM_GRID_URL: http://selenium-hub:4444/wd/hub
      HEADLESS: "True"
      TIMEOUT: 10
      BASE_URL: https://www.saucedemo.com
      TEST_USER: standard_user
      TEST_PASSWORD: secret_sauce
    volumes:
      - ./reports:/app/reports
    command: ./wait-for-it.sh postgres 5432 -- pytest -v --alluredir=reports/allure-results
